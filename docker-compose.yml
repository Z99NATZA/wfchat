services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wfchat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wfchat"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - ./apps/api/.env
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      FRONTEND_ORIGIN: http://${WFCHAT_PUBLIC_HOST:-localhost}:5173
      FRONTEND_ORIGINS: http://localhost:5173,http://${WFCHAT_PUBLIC_HOST:-localhost}:5173
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/wfchat
      VOICEVOX_BASE_URL: ${VOICEVOX_BASE_URL:-http://voicevox:50021}
      VOICEVOX_SPEAKER_ID: ${VOICEVOX_SPEAKER_ID:-1}
      VOICEVOX_CREDIT: ${VOICEVOX_CREDIT:-VOICEVOX speaker 1}
      VOICEVOX_SPEED_SCALE: ${VOICEVOX_SPEED_SCALE:-}
      VOICEVOX_PITCH_SCALE: ${VOICEVOX_PITCH_SCALE:-}
      VOICEVOX_INTONATION_SCALE: ${VOICEVOX_INTONATION_SCALE:-}
      VOICEVOX_VOLUME_SCALE: ${VOICEVOX_VOLUME_SCALE:-}
      VOICEVOX_PRE_PHONEME_LENGTH: ${VOICEVOX_PRE_PHONEME_LENGTH:-}
      VOICEVOX_POST_PHONEME_LENGTH: ${VOICEVOX_POST_PHONEME_LENGTH:-}
      CHAT_ATTACHMENT_UPLOAD_DIR: data/uploads
      CHAT_ATTACHMENT_MAX_BYTES: ${CHAT_ATTACHMENT_MAX_BYTES:-10485760}
      CHAT_ATTACHMENT_MAX_IMAGES_PER_MESSAGE: ${CHAT_ATTACHMENT_MAX_IMAGES_PER_MESSAGE:-4}
      CHAT_ATTACHMENT_MAX_WIDTH: ${CHAT_ATTACHMENT_MAX_WIDTH:-8192}
      CHAT_ATTACHMENT_MAX_HEIGHT: ${CHAT_ATTACHMENT_MAX_HEIGHT:-8192}
      CHAT_ATTACHMENT_MAX_PIXELS: ${CHAT_ATTACHMENT_MAX_PIXELS:-20000000}
    volumes:
      - api_uploads:/app/data/uploads
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      voicevox:
        condition: service_started
    restart: unless-stopped

  voicevox:
    image: voicevox/voicevox_engine:cpu-ubuntu20.04-latest
    ports:
      - "50021:50021"
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      args:
        VITE_API_BASE_URL: ""
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
        VITE_ENABLE_MARKDOWN_QA: "true"
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  api_uploads:
