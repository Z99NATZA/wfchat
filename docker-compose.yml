services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - ./apps/api/.env
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      FRONTEND_ORIGIN: http://localhost:5173
      DATA_PATH: /app/data/wfchat.json
    ports:
      - "8080:8080"
    volumes:
      - ./apps/api/data:/app/data
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      args:
        VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped
