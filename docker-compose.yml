services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wfchat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wfchat"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - ./apps/api/.env
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      FRONTEND_ORIGIN: http://localhost:5173
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/wfchat
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    restart: unless-stopped

  db-init:
    image: postgres:16-alpine
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/wfchat
    volumes:
      - ./apps/api/db/init.sql:/sql/init.sql:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "-c", "psql \"$$DATABASE_URL\" -v ON_ERROR_STOP=1 -f /sql/init.sql"]
    restart: "no"

  web:
    build:
      context: ./apps/web
      args:
        VITE_API_BASE_URL: http://localhost:8080
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
