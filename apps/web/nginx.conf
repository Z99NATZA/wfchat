server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ^~ /images/ {
    expires off;
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }

  location ~* \.(?:css|js|png|jpg|jpeg|webp|svg|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}
